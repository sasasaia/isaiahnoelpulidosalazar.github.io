name: Build Python Package

on:
  push:
    paths:
      - 'pypi/**'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Get Version and Changes
        id: metadata
        run: |
          # 1. Get Version from pyproject.toml
          VERSION=$(grep -m 1 "version =" pypi/pyproject.toml | cut -d '"' -f 2)
          
          # 2. Get Changes from __init__.py (looks for everything after '# changes:')
          # This script finds the package folder and reads the __init__.py
          CHANGES=$(python3 -c "
          import re
          from pathlib import Path
          init_content = Path('pypi/pythonbundle/__init__.py').read_text()
          match = re.search(r'# changes:\s*\n((?:\s*#\s*-.*\n?)+)', init_content, re.IGNORECASE)
          if match:
              # Clean up the # and spaces
              lines = [line.strip().lstrip('#').strip() for line in match.group(1).strip().splitlines()]
              print('\n'.join(lines))
          else:
              print('- No changes specified.')
          ")

          # Save to environment for next steps
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TAG_NAME=pythonbundle-v$VERSION" >> $GITHUB_ENV
          
          # Save multi-line changes to a special GitHub environment file
          echo "CHANGES<<EOF" >> $GITHUB_ENV
          echo "$CHANGES" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Build package
        working-directory: ./pypi
        run: |
          pip install build
          python -m build
      
      - name: Check if tag exists
        id: tag_check
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/${TAG_NAME}$"; then
            echo "Tag already exists. Skipping publish."
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Tag does not exist."
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Create Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.TAG_NAME }}
          body: |
            Auto-generated release.

            Version: v${{ env.VERSION }}
            Built from latest commit in pypi/.

            Changes:
            ${{ env.CHANGES }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish package
        if: steps.tag_check.outputs.exists == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: pypi/dist/