name: Build Android Dependency

on:
  push:
    paths:
      - 'android/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: cd android && chmod +x gradlew

    - name: Run Tests
      run: cd android && ./gradlew test

    - name: Build AAR file
      run: cd android && ./gradlew assembleRelease

    - name: Extract Version from build.gradle
      id: get_version
      run: |
        # Scans build.gradle for "version = 'X.X.X'" and extracts just the number inside the quotes
        VERSION=$(grep -oP "version\s*=\s*['\"]\K[^'\"]+" android/androiddependency/build.gradle | head -n 1)
        
        # Save it to the environment variables so the next step can use it
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "Extracted Version: $VERSION"

    - name: Create Release and Upload AAR (Releases Page)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Check if the tag already exists so the workflow doesn't fail on multiple pushes to the same version
        if gh release view "androiddependency-v${{ env.VERSION }}" > /dev/null 2>&1; then
          echo "Release androiddependency-v${{ env.VERSION }} already exists. Skipping release creation."
        else
          echo "Creating new release androiddependency-v${{ env.VERSION }}"
          
          RELEASE_NOTES="Auto-generated release.

          Version: v${{ env.VERSION }}
          Built from latest commit in android/."
          
          # Creates the Tag, the Release page, and uploads the .aar file to it!
          gh release create "androiddependency-v${{ env.VERSION }}" \
            android/androiddependency/build/outputs/aar/androiddependency-release.aar \
            --title "androiddependency-v${{ env.VERSION }}" \
            --notes "$RELEASE_NOTES" \
            --target ${{ github.sha }}
        fi