<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=7">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#F4F4F4">
    <meta name="description" content="A simple ERP system built with Node.js and SQL Server, featuring user authentication, inventory management, sales tracking, and a chat module.">
    <meta name="author" content="Isaiah Noel P. Salazar">
    <link rel="apple-touch-icon" sizes="57x57" href="../apple-icon-57x57.png">
    <link rel="apple-touch-icon" sizes="60x60" href="../apple-icon-60x60.png">
    <link rel="apple-touch-icon" sizes="72x72" href="../apple-icon-72x72.png">
    <link rel="apple-touch-icon" sizes="76x76" href="../apple-icon-76x76.png">
    <link rel="apple-touch-icon" sizes="114x114" href="../apple-icon-114x114.png">
    <link rel="apple-touch-icon" sizes="120x120" href="../apple-icon-120x120.png">
    <link rel="apple-touch-icon" sizes="144x144" href="../apple-icon-144x144.png">
    <link rel="apple-touch-icon" sizes="152x152" href="../apple-icon-152x152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="../apple-icon-180x180.png">
    <link rel="icon" type="image/png" sizes="192x192"  href="../android-icon-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="96x96" href="../favicon-96x96.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../favicon-16x16.png">
    <link rel="manifest" href="../manifest.json">
    <meta name="msapplication-TileColor" content="#F4F4F4">
    <meta name="msapplication-TileImage" content="../ms-icon-144x144.png">
    <title>Line ERP</title>
    <script src="../js/ECStyleSheet.js"></script>
    <script src="../js/ECElements.js"></script>
</head>
<body class="background-var(--ec-surface,_#f8f9fa) margin-0 minHeight-100vh display-flex flexDirection-column fontFamily--apple-system,_BlinkMacSystemFont,_'Segoe_UI',_Roboto,_sans-serif">
    
    <div id="global-loader" class="position-fixed inset-0 background-#ffffff zIndex-9999 display-flex flexDirection-column alignItems-center justifyContent-center transition-opacity_0.3s_ease">
        <div id="spinner-container"></div>
        <p class="marginTop-16px fontWeight-500 color-#64748b">Loading Workspace...</p>
    </div>

    <div id="login-root" class="display-none flex-1 width-100%"></div>

    <div id="app-layout" class="display-none flex-1 width-100% flexDirection-row overflow-hidden">
        
        <nav id="sidebar" class="width-260px background-#0f172a color-#ffffff display-flex flexDirection-column flexShrink-0 transition-transform_0.3s_ease zIndex-2000">
            <div class="padding-24px borderBottom-1px_solid_rgba(255,255,255,0.1) display-flex alignItems-center gap-12px">
                <div class="background-#3b82f6 color-#ffffff width-32px height-32px borderRadius-8px display-flex alignItems-center justifyContent-center fontWeight-bold fontSize-18px">L</div>
                <h1 class="margin-0 fontSize-20px fontWeight-600">Line ERP</h1>
            </div>
            <div id="sidebar-nav" class="flex-1 overflowY-auto padding-16px display-flex flexDirection-column gap-8px"></div>
        </nav>

        <div class="flex-1 display-flex flexDirection-column overflow-hidden position-relative">
            <header class="height-64px background-#ffffff borderBottom-1px_solid_#e2e8f0 display-flex alignItems-center justifyContent-space-between padding-0_24px flexShrink-0 zIndex-1000">
                <div class="display-flex alignItems-center gap-16px">
                    <button id="mobile-menu-btn" class="display-none background-none border-none fontSize-24px cursor-pointer padding-0 color-#64748b">☰</button>
                    <h2 id="topbar-title" class="margin-0 fontSize-18px fontWeight-600 color-#1e293b">Dashboard</h2>
                </div>
                <div class="display-flex alignItems-center gap-16px">
                    <div id="context-switcher-container"></div>
                    <div class="display-flex alignItems-center gap-8px padding-6px_12px background-#f1f5f9 borderRadius-999px">
                        <div class="width-24px height-24px borderRadius-50% background-#cbd5e1 display-flex alignItems-center justifyContent-center fontSize-12px fontWeight-bold color-#334155" id="user-initials">U</div>
                        <span id="user-name-display" class="fontSize-14px fontWeight-500 color-#334155"></span>
                    </div>
                    <button onclick="logout()" class="background-#ef4444 color-#ffffff border-none padding-6px_16px borderRadius-6px cursor-pointer hover:background-#dc2626 transition-0.2s fontWeight-500 fontSize-13px">Logout</button>
                </div>
            </header>
            
            <main id="app-root" class="flex-1 overflowY-auto padding-24px boxSizing-border-box background-#f8fafc"></main>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
