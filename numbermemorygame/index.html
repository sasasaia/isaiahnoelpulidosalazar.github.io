    </head>
    <body class="margin-0 padding-20px minHeight-100vh display-flex alignItems-center justifyContent-center background-linear-gradient(135deg,#0f172a,#1e293b) color-white">

        <div class="width-100% maxWidth-450px backgroundColor-#1e293b border-1px_solid_#334155 borderRadius-16px padding-40px boxShadow-0_20px_25px_-5px_rgba(0,0,0,0.3) textAlign-center display-flex flexDirection-column gap-20px">
            
            <h1 class="margin-0 fontSize-32px fontWeight-bold color-#f8fafc letterSpacing-1px">Number Memory</h1>

            <div id="stats" class="display-flex justifyContent-space-between width-100% fontSize-16px fontWeight-600 color-#94a3b8">
                <div>Level: <span id="level" class="color-#38bdf8">1</span></div>
                <div>High Score: <span id="highScore" class="color-#38bdf8">0</span></div>
            </div>

            <div id="timerContainer" class="width-100% height-6px backgroundColor-#334155 borderRadius-4px overflow-hidden opacity-0 transition-opacity_0.3s">
                <div id="timerBar" class="height-100% width-100% backgroundColor-#38bdf8 transition-none"></div>
            </div>

            <div id="numberDisplay" class="fontSize-56px fontWeight-800 letterSpacing-8px minHeight-80px display-flex alignItems-center justifyContent-center color-#f8fafc transition-color_0.3s"></div>

            <div id="inputArea" class="display-none flexDirection-column gap-16px width-100%">
                <input type="text" id="userInput" inputmode="numeric" pattern="[0-9]*" autocomplete="off" placeholder="Enter the number" class="width-100% padding-16px fontSize-24px textAlign-center borderRadius-8px border-2px_solid_#334155 backgroundColor-#0f172a color-white outline-none transition-all_0.3s focus:borderColor-#38bdf8" />
                <button id="submitBtn" class="width-100% padding-16px fontSize-18px fontWeight-bold borderRadius-8px border-none backgroundColor-#38bdf8 color-#0f172a cursor-pointer transition-all_0.2s hover:backgroundColor-#0ea5e9 hover:transform-translateY(-2px)">Submit</button>
            </div>

            <div id="message" class="fontSize-18px minHeight-28px fontWeight-600 transition-color_0.3s"></div>

            <button id="startBtn" class="width-100% padding-16px fontSize-18px fontWeight-bold borderRadius-8px border-none backgroundColor-#10b981 color-white cursor-pointer transition-all_0.2s hover:backgroundColor-#059669 hover:transform-translateY(-2px)">Start Game</button>
            
        </div>

    </body>
    <script src="index.js"></script>
</html>
